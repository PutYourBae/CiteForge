appId: com.citeforge.app
productName: CiteForge
copyright: "© 2025 CiteForge"

forceCodeSigning: false

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - dist-electron/**/*
  - database/schema.sql
  - assets/**/*
  - "!**/*.ts"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,test,tests}"
  - "!**/node_modules/.bin"

# ── Windows ──────────────────────────────────────────────
win:
  icon: assets/icon.ico
  sign: null
  signingHashAlgorithms: []
  target:
    - target: portable
      arch: [x64]
  artifactName: "CiteForge-${version}-win-portable.exe"

# ── macOS ────────────────────────────────────────────────
mac:
  icon: assets/icon.png
  target:
    - target: dmg
  category: public.app-category.productivity
  artifactName: "CiteForge-${version}-mac-${arch}.dmg"

# ── Linux ─────────────────────────────────────────────────
linux:
  icon: assets/icon.png
  target:
    - target: AppImage
      arch: [x64]
  artifactName: "CiteForge-${version}-linux.AppImage"

# Electron auto-updater config (optional for future use)
publish:
  provider: github
  releaseType: release
